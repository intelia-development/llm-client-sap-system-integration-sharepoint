version: 1.3.3
cache: true

interface:
  agents:
    use: true
    create: true
    share: false
    public: false
  mcpServers:
    use: true
    create: true
    share: false
    public: false

registration:
  socialLogins: ['openid']

mcpSettings:
  # Allow internal Docker MCP servers (SSRF protection is strict when configured)
  allowedDomains:
    - 'sap-docs-mcp'
    - 'vsp-mcp'
    - 'abapdoc-mcp'

mcpServers:
  sap-docs:
    type: streamable-http
    url: 'http://sap-docs-mcp:3122/mcp'
    chatMenu: true
    startup: true

  sap-dev-adt:
    type: streamable-http
    url: 'http://vsp-mcp:3000/mcp'
    chatMenu: true
    startup: true

  abap-doc:
    type: streamable-http
    url: 'http://abapdoc-mcp:3000/mcp'
    chatMenu: true
    startup: true


fileConfig:
  serverFileSizeLimit: 25

endpoints:
  # OpenRouter exposes 100+ models through one API key.
  # Models are fetched dynamically at startup.
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        fetch: true
        default: ["anthropic/claude-sonnet-4-5", "openai/gpt-4o", "meta-llama/llama-3.3-70b-instruct"]
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "OpenRouter"
  agents:
    disableBuilder: false
